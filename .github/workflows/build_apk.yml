name: Generate and Sign Production APK

on:
  push:
    tags:
      - 'v*' # Срабатывает при создании тега версии (например, v1.0.0)

permissions:
  contents: write

jobs:
  assemble:
    name: Compile and Distribute Signed Artifact
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Files
      uses: actions/checkout@v4

    - name: Install & Configure JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Ensure Executable Gradle Wrapper
      run: chmod +x gradlew

    - name: Retrieve and Decode Release Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-keystore.jks

    - name: Assemble Production Build
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_FILE: release-keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Align and Format Artifact Package Names
      run: |
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/AuraIDE-release.apk

    - name: Initialize Git Release & Attach Binary Artifacts
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/AuraIDE-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
