name: Generate and Sign Production APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    name: Compile and Distribute Signed Artifact
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Files
      uses: actions/checkout@v4

    - name: Install & Configure JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Assemble Debug Build
      run: gradle assembleDebug

    - name: Align and Format Artifact Package Names
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/AuraIDE-debug.apk

    - name: Initialize Git Release & Attach Binary Artifacts
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/AuraIDE-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
